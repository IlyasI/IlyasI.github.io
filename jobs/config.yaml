# Job Search Configuration
# All sources are 100% free - no API keys needed.

profile:
  title_queries:
    - "senior software engineer"
    - "senior backend engineer"
    - "senior data engineer"
    - "senior platform engineer"
    - "staff software engineer"
    - "senior software developer"

  skills:
    strong:
      - python
      - bigquery
      - gcp
      - dbt
      - sql
      - data engineering
      - etl
      - elt
      - data pipelines
      - bash
      - git
    moderate:
      - c++
      - aws
      - docker
      - flask
      - django
      - datadog
      - playwright
      - selenium
    familiar:
      - javascript
      - java
      - postgresql
      - react
      - node.js

  location: "New York, NY"
  remote_ok: true
  min_salary: 170000
  max_salary: 350000
  years_experience: 6

search:
  max_age_hours: 168
  min_score: 20
  max_results: 500

  exclude_companies:
    - "Two Sigma"
    - "Two Sigma Investments"
    - "Two Sigma Securities"

  exclude_keywords:
    - "principal"
    - "director"
    - "vp "
    - "vice president"
    - "manager"
    - "junior"
    - "intern"
    - "entry level"

  # Only show jobs matching these location patterns (case-insensitive substring match)
  accepted_locations:
    - "new york"
    - "nyc"
    - ", ny"
    - "united states"
    - "usa"
    - "remote - us"
    - "remote - united states"
    - "remote (u.s"
    - "remote, us"
    - "remote - usa"
    - "anywhere"
    - "worldwide"
    - "us "
    - "u.s."
    - "san francisco"
    - "california"
    - ", ca"
    - "seattle"
    - ", wa"
    - "boston"
    - "chicago"
    - "austin"
    - "denver"
    - "los angeles"

  # Reject locations containing these country names (catches "Portugal, Remote" etc.)
  rejected_countries:
    - "france"
    - "germany"
    - "spain"
    - "portugal"
    - "italy"
    - "switzerland"
    - "ireland"
    - "india"
    - "brazil"
    - "canada"
    - "uk"
    - "united kingdom"
    - "japan"
    - "korea"
    - "singapore"
    - "australia"
    - "netherlands"
    - "sweden"
    - "poland"
    - "czech"
    - "romania"
    - "turkey"
    - "israel"

  boost_keywords:
    - "genai"
    - "llm"
    - "ai"
    - "data platform"
    - "cost"
    - "fintech"
    - "financial"
    - "hedge fund"
    - "quantitative"

